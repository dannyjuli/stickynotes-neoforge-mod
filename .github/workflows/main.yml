name: Build Sticky Notes Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8

      - name: Build mod
        run: gradle build

      - uses: actions/upload-artifact@v4
        with:
          name: stickynotes-jar
          path: build/libs/*.jar
